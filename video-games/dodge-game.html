<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Click Dodge Game</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
    text-align: center;
  }

  h1 { margin-top: 20px; }

  #gameArea {
    position: relative;
    margin: 20px auto;
    width: 400px;
    height: 400px;
    background: #111;
    border: 3px solid #00ffcc;
    overflow: hidden;
  }

  .player {
    position: absolute;
    width: 20px;
    height: 20px;
    background: #00ffcc;
  }

  .enemy {
    position: absolute;
    width: 20px;
    height: 20px;
    background: #ff4d4d;
  }

  button {
    padding: 8px 14px;
    margin-top: 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background: #00ffcc;
    color: black;
  }
</style>
</head>
<body>

<h1>Dodge Game</h1>
<p>Click to move. Avoid the red squares.</p>

<div id="gameArea">
  <div class="player" id="player"></div>
</div>

<p>Score: <span id="score">0</span></p>
<button onclick="resetGame()">Restart</button>

<script>
const gameArea = document.getElementById('gameArea');
const player = document.getElementById('player');
const scoreDisplay = document.getElementById('score');

let playerPos = { x: 190, y: 190 };
let enemies = [];
let score = 0;
let gameRunning = true;

function updatePlayer() {
  player.style.left = playerPos.x + 'px';
  player.style.top = playerPos.y + 'px';
}

function spawnEnemy() {
  const enemy = document.createElement('div');
  enemy.classList.add('enemy');

  enemy.x = Math.random() * 380;
  enemy.y = 0;
  enemy.speed = 2 + Math.random() * 3;

  enemy.style.left = enemy.x + 'px';
  enemy.style.top = enemy.y + 'px';

  gameArea.appendChild(enemy);
  enemies.push(enemy);
}

function updateEnemies() {
  enemies.forEach((enemy, index) => {
    enemy.y += enemy.speed;
    enemy.style.top = enemy.y + 'px';

    // collision
    if (
      enemy.x < playerPos.x + 20 &&
      enemy.x + 20 > playerPos.x &&
      enemy.y < playerPos.y + 20 &&
      enemy.y + 20 > playerPos.y
    ) {
      gameRunning = false;
      alert('Game Over! Score: ' + score);
      resetGame();
    }

    // remove if off screen
    if (enemy.y > 400) {
      enemy.remove();
      enemies.splice(index, 1);
      score++;
      scoreDisplay.innerText = score;
    }
  });
}

function gameLoop() {
  if (!gameRunning) return;
  updateEnemies();
  requestAnimationFrame(gameLoop);
}

function resetGame() {
  enemies.forEach(e => e.remove());
  enemies = [];
  score = 0;
  scoreDisplay.innerText = score;
  gameRunning = true;
}

// click to move

gameArea.addEventListener('click', (e) => {
  const rect = gameArea.getBoundingClientRect();
  playerPos.x = e.clientX - rect.left - 10;
  playerPos.y = e.clientY - rect.top - 10;
  updatePlayer();
});

setInterval(spawnEnemy, 800);
updatePlayer();
gameLoop();
</script>

</body>
</html>
